---
layout: default
---
<article class="project">
  <h1>{{ page.title }}</h1>
  {% if page.tagline %}<p class="post-meta">{{ page.tagline }}</p>{% endif %}

  {{ content }}

  {% if page.link %}
  <p><a class="button" href="{{ page.link }}">{{ page.link_text | default: "Open project &rarr;" }}</a></p>
  {% endif %}

  <p class="back-link"><a href="{{ '/projects/' | relative_url }}">&larr; Back to projects</a></p>
</article>
