---
layout: default
title: Blog
permalink: /blog/
---
<h1>Blog</h1>

{% if site.posts.size == 0 %}
<p>No posts yet — check back soon.</p>
{% else %}
<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
  {% endfor %}
</ul>
{% endif %}
